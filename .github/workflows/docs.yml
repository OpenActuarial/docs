name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install documentation dependencies
        run: pip install -r requirements.txt

      - name: Record the package versions this build documents
        run: |
          {
            echo "Built from \`docs@${GITHUB_SHA::12}\` with:"
            echo
            echo '```'
            pip freeze | grep -E '^(actuarialpy|experiencestudies|projectionmodels|ratingmodels|lossmodels|extremeloss|risksim)=='
            echo '```'
          } > docs/_build_info.md

      # Same strict flags as CI: the artifact that deploys is the artifact
      # that was validated. -W fails on warnings, --keep-going reports all.
      - name: Build Sphinx site
        run: python -m sphinx -b html -W --keep-going docs _build/html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _build/html

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5